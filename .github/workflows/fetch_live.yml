name: 直播源自动采集

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install requests
      - name: 运行采集脚本
        run: python live_fetcher.py
      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_sources.m3u live_sources.m3u.bak 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "自动更新直播源 $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
