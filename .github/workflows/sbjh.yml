name: 色播聚合自动采集更新

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Del old runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 3

    - name: Set Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Full Spider
      run: python py/ssjh.py

    - name: Commit Push Fix Conflict
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git fetch origin main
        git reset --hard origin/main
        python py/ssjh.py
        git add "*.m3u" "cache_crawled.txt" "scraper.log"
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Auto update 色播聚合 无上限+断点续爬+测速 [skip ci]"
          git push origin main
        else
          echo "No changes, skip push"
        fi
