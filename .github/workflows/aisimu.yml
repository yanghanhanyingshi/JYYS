name: Aisimu自动采集更新

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */20 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-spider:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 清理旧记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 3

    - name: 配置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4

    - name: 执行采集
      run: python py/aisimu.py
      timeout-minutes: 25

    - name: 提交更新
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git pull --rebase origin main || true
        git add output/
        if git diff --staged --quiet; then
          echo "✅ 无变更"
          exit 0
        fi
        git commit -m "Auto update aisimu m3u [skip ci]"
        git push origin main
      timeout-minutes: 5
